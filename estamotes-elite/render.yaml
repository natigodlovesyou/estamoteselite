services:
  - type: web
    name: estamotes-elite
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18
      - key: TURSO_DATABASE_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: REACT_APP_ADMIN_SECRET
        sync: false
